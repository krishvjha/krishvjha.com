<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Recipe AI</title>

  <link rel="stylesheet" href="./css/styles.css" />
</head>

<body>
  <div class="app">
    <header class="hero">
      <div>
        <p class="eyebrow">Smart pantry-based recipe finder</p>
        <h1>Recipe AI</h1>
        <p class="subtitle">
          Find recipes you can cook from ingredients you already have.
        </p>
      </div>
    </header>

    <form id="recipeForm" class="form-card">
      <div class="form-group">
        <label for="searchInput">Add dish or ingredient</label>

        <div class="typeahead-wrapper">
          <input
            id="searchInput"
            type="text"
            placeholder="Start typing: Chicken Curry, paneer, pyaaz, turmeric..."
            autocomplete="off"
            role="combobox"
            aria-autocomplete="list"
            aria-expanded="false"
          />

          <div id="searchResults" class="typeahead-results"></div>
        </div>

        <p class="input-help">
          Select a dish to view the full recipe. Select ingredients to build your pantry.
        </p>
      </div>

      <div class="form-group">
        <div class="section-label-row">
          <label>Selected ingredients</label>
          <span class="small-muted">Your current pantry</span>
        </div>

        <div id="selectedIngredients" class="selected-box"></div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="cuisine">Cuisine</label>
          <select id="cuisine">
            <option value="any">Any</option>
            <option value="indian">Indian</option>
            <option value="italian">Italian</option>
            <option value="asian">Asian</option>
            <option value="turkish">Turkish</option>
            <option value="lebanese">Lebanese</option>
            <option value="global">Global</option>
          </select>
        </div>

        <div class="form-group">
          <label for="maxTime">Maximum cooking time</label>
          <select id="maxTime">
            <option value="any">Any</option>
            <option value="15">15 minutes</option>
            <option value="20">20 minutes</option>
            <option value="25">25 minutes</option>
            <option value="30">30 minutes</option>
            <option value="35">35 minutes</option>
            <option value="40">40 minutes</option>
            <option value="45">45 minutes</option>
            <option value="50">50 minutes</option>
            <option value="60">60 minutes</option>
          </select>
        </div>

        <div class="form-group">
          <label for="dietaryProfile">Dietary preference</label>
          <select id="dietaryProfile">
            <option value="any">Any</option>
            <option value="vegetarian">Vegetarian</option>
            <option value="eggetarian">Eggetarian</option>
            <option value="nonVegetarian">Non-vegetarian</option>
            <option value="hinduVeg">Hindu vegetarian</option>
            <option value="hinduNonVeg">Hindu non-vegetarian</option>
            <option value="halal">Halal</option>
          </select>
        </div>
      </div>

      <div class="action-row">
        <button type="submit" class="primary-button">
          Find recipes from selected ingredients
        </button>

        <button type="button" id="clearIngredientsButton" class="secondary-button">
          Clear ingredients
        </button>

        <button type="button" id="resetFiltersButton" class="secondary-button">
          Reset filters
        </button>
      </div>
    </form>

    <main id="results"></main>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
